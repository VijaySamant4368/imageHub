<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | ImgHub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="page-head">
      <nav class="row" aria-label="Primary navigation">
        <a href="index.html" class="button">ImgHub</a>
        <div class="row" style="margin-left: auto;">
          <a href="gallery.html" class="button ghost">Gallery</a>
          <a href="upload.html" class="button ghost">Upload</a>
          <a href="login.html" class="button secondary">Access</a>
        </div>
      </nav>
      <div class="link-row">
        <a href="index.html">Home</a>
        <span aria-hidden="true"> / </span>
        <span>Gallery</span>
      </div>
      <p class="page-kicker">Repositories</p>
      <h1>Saved Collections</h1>
      <p class="page-subtitle">A local list of your encrypted image repositories. Repositories are stored only in this browser.</p>
    </header>

    <div class="actions" style="justify-content: flex-end; margin-bottom: -1rem;">
      <button id="addRepoBtn" class="primary">Add Repository</button>
    </div>

    <section class="card" style="background: transparent; border: none; box-shadow: none; padding: 0;">
      <div id="repoList" class="repo-list">
        <!-- JS will populate this -->
      </div>
    </section>
  </main>

  <script src="utils.js"></script>
  <script src="gallery.js"></script>
</body>
</html>
