<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access | ImgHub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="page-head">
      <nav class="row" aria-label="Primary navigation">
        <a href="index.html" class="button">ImgHub</a>
        <div class="row" style="margin-left: auto;">
          <a href="gallery.html" class="button ghost">Gallery</a>
          <a href="upload.html" class="button ghost">Upload</a>
          <a href="login.html" class="button secondary">Access</a>
        </div>
      </nav>
      <div class="link-row">
        <a href="index.html">Home</a>
        <span aria-hidden="true"> / </span>
        <span>Access</span>
      </div>
      <p class="page-kicker">Security</p>
      <h1>GitHub Access Token</h1>
      <p class="page-subtitle">Your Personal Access Token (PAT) is encrypted locally. It is never sent to our servers, only to GitHub.</p>
    </header>

    <section class="card">
      <h2 class="card-title">Token Configuration</h2>
      <div id="loginText" class="status-bar" style="margin-bottom: 1.5rem;">Checking token status...</div>
      
      <div class="field">
        <label for="patInput">GitHub Personal Access Token</label>
        <input id="patInput" type="password" placeholder="ghp_xxxxxxxxxxxx" />
        <p class="link-row" style="margin-top: 0.5rem;">
          <a href="https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-fine-grained-personal-access-token" target="_blank" rel="noopener noreferrer">How to generate a token?</a>
        </p>
      </div>

      <div class="actions">
        <button id="savePatBtn">Save Token</button>
        <button id="browseBtn" class="secondary">Back to Dashboard</button>
      </div>
    </section>
  </main>

  <script src="utils.js"></script>
  <script src="login.js"></script>
</body>
</html>
