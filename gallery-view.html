<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repo View | ImgHub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="page-head">
      <nav class="row" aria-label="Primary navigation">
        <a href="index.html" class="button">ImgHub</a>
        <div class="row" style="margin-left: auto;">
          <a href="gallery.html" class="button ghost">Gallery</a>
          <a href="upload.html" class="button ghost">Upload</a>
          <a href="login.html" class="button secondary">Access</a>
        </div>
      </nav>
      <div class="link-row">
        <a href="index.html">Home</a>
        <span aria-hidden="true"> / </span>
        <a href="gallery.html">Gallery</a>
        <span aria-hidden="true"> / </span>
        <span>Repo View</span>
      </div>
      <p class="page-kicker" id="repoInfo">Repository View</p>
      <h1>Encrypted Gallery</h1>
      <p class="page-subtitle">Enter the repository passphrase to decrypt and view your images. High-resolution previews are available in the viewer.</p>
    </header>

    <div class="actions" style="justify-content: space-between; align-items: center; margin-bottom: -1rem;">
      <button id="backBtn" class="secondary">← Back to Collections</button>
    </div>

    <section class="card" style="background: transparent; border: none; box-shadow: none; padding: 0;">
      <div id="images" class="gallery-grid">
        <!-- JS will decrypt and populate images here -->
      </div>
    </section>
  </main>

  <script src="carousel.js"></script>
  <script src="gallery-view.js"></script>
  <script src="utils.js"></script>
  <script src="imgEncrypt.js"></script>
</body>
</html>
